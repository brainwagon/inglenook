<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inglenook Sidings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="container">
    <canvas id="gameCanvas"></canvas>

    <div id="title-overlay">Inglenook Sidings</div>

    <!-- Settings Menu -->
    <div id="settings-menu" class="hidden">
      <h3>Settings</h3>
      <div class="setting-item">
        <label>
          <input type="checkbox" id="check-signs" checked> Show Siding Signs
        </label>
      </div>
      <div class="setting-item">
        <label>
          <input type="checkbox" id="check-conductor"> Conductor View
        </label>
      </div>
      <button id="btn-close-settings">Close</button>
    </div>

    <!-- Set Target Modal -->
    <div id="target-modal" class="hidden">
      <div id="target-modal-box">
        <h3>Set Target</h3>
        <p>Enter 5 unique car numbers (1–8)</p>
        <div id="target-input-row">
          <input type="text" id="target-input-1" class="target-input" maxlength="1">
          <input type="text" id="target-input-2" class="target-input" maxlength="1">
          <input type="text" id="target-input-3" class="target-input" maxlength="1">
          <input type="text" id="target-input-4" class="target-input" maxlength="1">
          <input type="text" id="target-input-5" class="target-input" maxlength="1">
        </div>
        <div id="target-modal-error" class="hidden"></div>
        <div id="target-modal-buttons">
          <button id="btn-target-ok">OK</button>
          <button id="btn-target-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <!-- HUD Overlay -->
    <div id="hud">
      <div id="target-panel">
        <div id="target-label">Assemble this train</div>
        <div id="target-cars"></div>
      </div>
      <div id="hud-right">
        <div id="move-counter">Moves: 0</div>
        <div id="status-line">Loco on A</div>
      </div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <div id="move-buttons">
        <span class="control-label">Move to:</span>
        <button class="btn-move" data-track="A">A</button>
        <button class="btn-move" data-track="B">B</button>
        <button class="btn-move" data-track="C">C</button>
        <button class="btn-move" data-track="D">D</button>
      </div>
      <div id="action-buttons">
        <button id="btn-couple">Couple</button>
        <button id="btn-decouple">Decouple</button>
      </div>
      <button id="btn-solve">Solve</button>
      <button id="btn-retry">Retry</button>
      <button id="btn-reset">New Game</button>
      <button id="btn-set-target">Set Target</button>
      <button id="btn-settings">Settings</button>
    </div>

    <!-- Victory overlay -->
    <div id="victory" class="hidden">
      <div id="victory-text">Victory!</div>
      <div id="victory-moves"></div>
      <div id="victory-buttons">
        <button id="btn-replay-level">Replay Level</button>
        <button id="btn-new-game">New Game</button>
      </div>
    </div>

    <!-- Conductor View PIP border -->
    <div id="conductor-pip" class="hidden"></div>

    <!-- Error toast -->
    <div id="error-toast" class="hidden"></div>
  </div>

  <!-- Three.js r152 (global build with OrbitControls) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Game scripts in dependency order -->
  <script src="js/solver.js"></script>
  <script src="js/config.js"></script>
  <script src="js/tracks.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/gameState.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/interaction.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
